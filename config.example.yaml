# M1 解析服务配置模板。复制为 config.yaml 后填真实路径。
server:
  host: "127.0.0.1"
  port: 8765                    # D-9 锁定，勿改

vault:
  root: "E:\\AI_Tools\\Obsidian\\data\\notes-personal"
  inbox_subdir: "inbox/douyin"
  attachments_subdir: "attachments/douyin"

queue:
  db_path: "E:\\project\\douyin_to_obsidian\\data\\queue.sqlite3"
  zombie_timeout_minutes: 30    # B4 zombie 复活阈值

downloader:
  cookies_path: ""              # 留空 = 不用 cookie；填路径 = 启用 cookie 探活
  temp_dir: "E:\\project\\douyin_to_obsidian\\data\\tmp"
  yt_dlp_retries: 3
  douk_path: ""                 # DouK-Downloader 可执行路径，留空 = 禁用兜底

llm:
  provider: openai_compatible   # openai_compatible | ollama_local
  openai_compatible:
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model: "mimo-v2.5-pro"
    api_key_env: "LLM_API_KEY"
  ollama_local:
    model: "qwen2.5:7b"
    base_url: "http://localhost:11434"

vision:
  enabled: false               # 默认关闭，手动开启
  provider: ollama              # ollama | cloud_api
  ollama:
    model: "qwen2.5-vl:7b"
    base_url: "http://localhost:11434"
  cloud_api:
    base_url: "https://token-plan-cn.xiaomimimo.com/v1"
    model: "mimo-v2-omni"
    api_key_env: "VLM_API_KEY"
  keyframe_max: 30             # 最大关键帧数量
  scene_threshold: 0.4         # 场景变化检测阈值

frame_selection:
  provider: semantic           # semantic | interval
  semantic:
    llm_ref: openai_compatible
    max_frames: 15
    fallback: asr_segments
  interval:
    seconds: 10

asr:
  provider: mimo                # mimo | whisper_local
  mimo:
    model: mimo-v2.5-asr
  whisper:
    model: Belle-whisper-large-v3-turbo-zh
    device: cuda
    compute_type: int8_float16

platforms:
  enabled:                      # 启用的平台列表
    - douyin                    # 抖音
    - bilibili                  # B站
    - xiaohongshu               # 小红书
    - youtube                   # YouTube

logging:
  level: "INFO"
  dir: "E:\\project\\douyin_to_obsidian\\logs"
  rotation: "daily"

git_backup:
  vault_root: "E:\\AI_Tools\\Obsidian\\data\\notes-personal"
  remote_url: ""                # OQ-4 未决，留空 = 仅本地 commit
  cron_time: "03:00"
